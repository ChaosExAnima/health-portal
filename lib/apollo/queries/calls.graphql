query CallsIndex($offset: Int!) {
	getCalls(offset: $offset) {
		totalCount
		calls {
			id
			slug
			date
			reps
			note {
				description
			}
			provider {
				__typename
				name
				slug
			}
		}
	}
}

query Call( $slug: String! ) {
	call(slug: $slug) {
		id
		slug
		date
		provider {
			id
			name
			slug
		}
	}
}

mutation CallNew( $call: CallInput! ) {
	newCall(call: $call) {
		success
		call {
			id
		}
	}
}
